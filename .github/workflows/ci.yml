name: Yield-AI CI

on:
  push:
    branches: [main, master, feature/**]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint · Type Check · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      # ─── Lint (ruff is 100x faster than flake8) ───────────────────────────
      - name: Lint with ruff
        run: ruff check src/ app/ api.py --select E,W,F --ignore E501,E402
        # E501 = line too long — ignored since LLM prompts are naturally long

      # ─── Type check ───────────────────────────────────────────────────────
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # warnings only, don't fail the pipeline

      # ─── Unit tests ───────────────────────────────────────────────────────
      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"   # disable tracing in CI
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t yield-ai-api:ci .

      - name: Build UI image
        run: docker build -f Dockerfile.ui -t yield-ai-ui:ci .
